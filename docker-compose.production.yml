services:
  bulonera_web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bulonera_web_production
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DJANGO_SETTINGS_MODULE: web_bulonera.settings.production
      DEBUG: "False"
      STATIC_ROOT: /app/staticfiles
      MEDIA_ROOT: /app/media
      LOG_DIR: /app/logs
    ports:
      - "127.0.0.1:8002:8002"
    volumes:
      - bulonera_staticfiles:/app/staticfiles
      - ${BULONERA_SHARED_MEDIA_PATH:-/var/www/shared/media}:/app/media
      - ${BULONERA_LOG_PATH:-/var/www/bulonera/logs}:/app/logs
    restart: unless-stopped

volumes:
  bulonera_staticfiles:
