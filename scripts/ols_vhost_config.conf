# ============================================
# OpenLiteSpeed Virtual Host Configuration
# ============================================
# Configuración para buloneraalvear.online
# 
# IMPORTANTE:
# - Static y Media deben ser servidos por OLS directamente
# - Solo las rutas dinámicas se proxean a Django
# ============================================

# Virtual Host: buloneraalvear.online
docRoot                   /var/www/bulonera/staticfiles

# Context: Static Files
context /static/ {
  location                /var/www/bulonera/staticfiles/
  allowBrowse             0
  enableExpires           1
  expiresByType           image/*=A31536000, text/css=A31536000, application/javascript=A31536000
  
  extraHeaders            <<<END_extraHeaders
Cache-Control: public, max-age=31536000, immutable
  END_extraHeaders
}

# Context: Media Files
context /media/ {
  location                /var/www/shared/media/
  allowBrowse             0
  enableExpires           1
  expiresByType           image/*=A31536000
  
  extraHeaders            <<<END_extraHeaders
Cache-Control: public, max-age=31536000
  END_extraHeaders
}

# Context: PWA Manifest (servido por Django con MIME correcto)
# Esta regla asegura que /manifest.json pase a Django, no sea interceptado
# RewriteRule ^/manifest\.json$ - [L]

# Context: Django Application (Proxy)
context / {
  type                    proxy
  handler                 django_backend
  addDefaultCharset       off
}

# External App: Django Backend
extprocessor django_backend {
  type                    proxy
  address                 http://127.0.0.1:8003
  maxConns                100
  pcKeepAliveTimeout      60
  initTimeout             60
  retryTimeout            0
  respBuffer              0
}

# Rewrite Rules
rewrite  {
  enable                  1
  autoLoadHtaccess        1
  
  # Forzar HTTPS
  RewriteCond %{HTTPS} !=on
  RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
  
  # Servir static y media directamente (no proxear)
  RewriteRule ^/static/ - [L]
  RewriteRule ^/media/ - [L]
}

# SSL Configuration
vhssl  {
  keyFile                 /etc/letsencrypt/live/buloneraalvear.online/privkey.pem
  certFile                /etc/letsencrypt/live/buloneraalvear.online/fullchain.pem
  certChain               1
  sslProtocol             24
  enableECDHE             1
  renegProtection         1
  sslSessionCache         1
  sslSessionTickets       1
  enableSpdy              15
  enableQuic              1
  enableStapling          1
  ocspRespMaxAge          86400
}

# Security Headers
extraHeaders            <<<END_extraHeaders
X-Frame-Options: SAMEORIGIN
X-Content-Type-Options: nosniff
X-XSS-Protection: 1; mode=block
Referrer-Policy: strict-origin-when-cross-origin
Permissions-Policy: geolocation=(), microphone=(), camera=()
END_extraHeaders
