{% comment %}
Password Requirements Component
Indicador de requisitos de contraseña con validación en tiempo real
Props: password (Alpine.js binding)
{% endcomment %}

<div class="mt-3 space-y-2" x-show="password" x-transition>
    <!-- Requisito 1: Longitud -->
    <div class="flex items-center gap-2 text-sm transition-colors"
         :class="password.length >= 8 ? 'text-green-600 dark:text-green-400' : 'text-slate-500 dark:text-slate-400'">
        <i data-lucide="check-circle" class="w-4 h-4"
           x-show="password.length >= 8"></i>
        <i data-lucide="circle" class="w-4 h-4"
           x-show="password.length < 8"></i>
        <span>Mínimo 8 caracteres</span>
    </div>
    
    <!-- Requisito 2: Mayúsculas y minúsculas -->
    <div class="flex items-center gap-2 text-sm transition-colors"
         :class="/[a-z]/.test(password) && /[A-Z]/.test(password) ? 'text-green-600 dark:text-green-400' : 'text-slate-500 dark:text-slate-400'">
        <i data-lucide="check-circle" class="w-4 h-4"
           x-show="/[a-z]/.test(password) && /[A-Z]/.test(password)"></i>
        <i data-lucide="circle" class="w-4 h-4"
           x-show="!/[a-z]/.test(password) || !/[A-Z]/.test(password)"></i>
        <span>Mayúsculas y minúsculas</span>
    </div>
    
    <!-- Requisito 3: Números -->
    <div class="flex items-center gap-2 text-sm transition-colors"
         :class="/\d/.test(password) ? 'text-green-600 dark:text-green-400' : 'text-slate-500 dark:text-slate-400'">
        <i data-lucide="check-circle" class="w-4 h-4"
           x-show="/\d/.test(password)"></i>
        <i data-lucide="circle" class="w-4 h-4"
           x-show="!/\d/.test(password)"></i>
        <span>Al menos un número</span>
    </div>
    
    <!-- Requisito 4: Caracteres especiales -->
    <div class="flex items-center gap-2 text-sm transition-colors"
         :class="/[^a-zA-Z\d]/.test(password) ? 'text-green-600 dark:text-green-400' : 'text-slate-500 dark:text-slate-400'">
        <i data-lucide="check-circle" class="w-4 h-4"
           x-show="/[^a-zA-Z\d]/.test(password)"></i>
        <i data-lucide="circle" class="w-4 h-4"
           x-show="!/[^a-zA-Z\d]/.test(password)"></i>
        <span>Caracteres especiales (!@#$%)</span>
    </div>
</div>
