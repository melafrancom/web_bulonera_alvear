<!-- Social Media Embed Component with Lazy-Load -->
<!-- Implementa lazy-load via Alpine.js Intersection Observer para preservar CWV -->

{% load static %}

<section class="my-12 p-8 bg-gray-50 dark:bg-slate-900 rounded-lg border border-gray-200 dark:border-slate-800">
  <h3 class="text-xl font-bold text-gray-900 dark:text-white mb-6">
    Publicación Original en {{ social_meta.get_platform_display }}
  </h3>
  
  <!-- Alpine.js Intersection Observer para Lazy-Load -->
  <div
    x-data="{
      embedLoaded: false,
      platform: '{{ social_meta.platform }}'
    }"
    @intersect="if (!embedLoaded) { $el.innerHTML = `{embed_html}`; embedLoaded = true; if (window.instgrm) window.instgrm.Embeds.process(); if (window.tiktok) window.tiktok.embed.lib.render($el); }"
    class="embed-container"
  >
    <!-- Placeholder Skeleton mientras carga el embed -->
    <div class="w-full h-96 bg-gradient-to-r from-gray-200 to-gray-300 dark:from-slate-700 dark:to-slate-800 rounded-lg animate-pulse flex items-center justify-center">
      <div class="text-center">
        <svg class="w-12 h-12 mx-auto mb-2 text-gray-400 dark:text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
        </svg>
        <p class="text-gray-500 dark:text-slate-400 text-sm">
          Cargando contenido de {{ social_meta.get_platform_display }}...
        </p>
      </div>
    </div>
  </div>

  <!-- Original URL Link (Fallback para NoScript) -->
  <div class="mt-4 text-center">
    <a href="{{ social_meta.original_url }}" 
       target="_blank" 
       rel="noopener noreferrer"
       class="inline-block px-4 py-2 text-sm font-semibold text-blue-600 dark:text-blue-400 hover:text-blue-800 dark:hover:text-blue-300 transition">
      Ver post original en {{ social_meta.get_platform_display }} ↗
    </a>
  </div>
</section>

<!-- Scripts para activar embeds de terceros -->
<script>
  // Instagram
  if (document.currentScript.dataset.platform === 'instagram' && !window.instgrm) {
    var script = document.createElement('script');
    script.src = 'https://www.instagram.com/embed.js';
    script.async = true;
    document.body.appendChild(script);
  }

  // TikTok
  if (document.currentScript.dataset.platform === 'tiktok' && !window.tiktok) {
    var script = document.createElement('script');
    script.src = 'https://www.tiktok.com/embed.js';
    script.async = true;
    document.body.appendChild(script);
  }

  // Twitter/X
  if (document.currentScript.dataset.platform === 'x' && !window.twttr) {
    var script = document.createElement('script');
    script.src = 'https://platform.twitter.com/widgets.js';
    script.async = true;
    document.body.appendChild(script);
  }

  // Facebook
  if (document.currentScript.dataset.platform === 'facebook' && !window.FB) {
    var script = document.createElement('script');
    script.innerHTML = `
      window.fbAsyncInit = function() {
        FB.init({
          xfbml: true,
          version: 'v18.0'
        });
        FB.XFBML.parse();
      };
    `;
    document.body.appendChild(script);
    var fbScript = document.createElement('script');
    fbScript.src = 'https://connect.facebook.net/es_ES/sdk.js#xfbml=1&version=v18.0';
    fbScript.async = true;
    fbScript.defer = true;
    document.body.appendChild(fbScript);
  }
</script>
