{% load l10n %}
<script>
{% localize off %}
    tailwind.config = {
        darkMode: 'class',
        theme: {
            extend: {
                colors: {
                    primary: {
                        DEFAULT: '{{ site_theme.primary_800 }}',
                        50:  '{{ site_theme.primary_50 }}',
                        100: '{{ site_theme.primary_100 }}',
                        200: '{{ site_theme.primary_200 }}',
                        300: '{{ site_theme.primary_300 }}',
                        400: '{{ site_theme.primary_400 }}',
                        500: '{{ site_theme.primary_500 }}',
                        600: '{{ site_theme.primary_600 }}',
                        700: '{{ site_theme.primary_700 }}',
                        800: '{{ site_theme.primary_800 }}',
                        900: '{{ site_theme.primary_900 }}',
                    },
                    accent: {
                        DEFAULT: '{{ site_theme.accent_500 }}',
                        400: '{{ site_theme.accent_400 }}',
                        500: '{{ site_theme.accent_500 }}',
                        600: '{{ site_theme.accent_600 }}',
                    },
                    'soft-bg': '{{ site_theme.soft_bg }}',
                    'navbar-bg': 'rgba({{ site_theme.navbar_bg_rgb }}, {{ site_theme.navbar_opacity_dec }})',
                    'navbar-text': '{{ site_theme.navbar_text }}',
                    'topbar-text': '{{ site_theme.topbar_text }}',
                    'subbar-from': 'rgba({{ site_theme.subbar_from_rgb }}, {{ site_theme.subbar_opacity_dec }})',
                    'subbar-to': 'rgba({{ site_theme.subbar_to_rgb }}, {{ site_theme.subbar_opacity_dec }})',
                    'footer-bg': 'rgba({{ site_theme.footer_bg_rgb }}, {{ site_theme.footer_opacity_dec }})',
                    'footer-text': '{{ site_theme.footer_text }}',
                    'quickcat-bg': 'rgba({{ site_theme.quickcat_bg_rgb }}, {{ site_theme.quickcat_opacity_dec }})',
                    'bestseller-bg': 'rgba({{ site_theme.bestseller_bg_rgb }}, {{ site_theme.bestseller_opacity_dec }})',
                },
                fontFamily: {
                    sans: ['Inter', 'system-ui', 'sans-serif'],
                },
                typography: (theme) => ({
                    DEFAULT: {
                        css: {
                            maxWidth: 'none',
                            color: theme('colors.gray.800'),
                            h2: {
                                color: theme('colors.gray.900'),
                                fontWeight: '700',
                                fontSize: '1.75rem',
                                marginTop: '2.5rem',
                                marginBottom: '1rem',
                                borderBottom: `2px solid ${theme('colors.primary.200')}`,
                                paddingBottom: '0.5rem',
                            },
                            h3: {
                                color: theme('colors.gray.800'),
                                fontWeight: '600',
                                fontSize: '1.35rem',
                                marginTop: '2rem',
                            },
                            a: {
                                color: theme('colors.primary.600'),
                                textDecoration: 'underline',
                                fontWeight: '500',
                                '&:hover': { color: theme('colors.primary.800') },
                            },
                            blockquote: {
                                borderLeftColor: theme('colors.accent.400'),
                                backgroundColor: theme('colors.accent.50'),
                                padding: '1rem 1.5rem',
                                borderRadius: '0.5rem',
                                fontStyle: 'normal',
                                color: theme('colors.gray.700'),
                            },
                            'ul > li::marker': { color: theme('colors.primary.500') },
                            'ol > li::marker': { color: theme('colors.primary.500') },
                            strong: { color: theme('colors.gray.900') },
                            img: { borderRadius: '0.75rem', boxShadow: '0 4px 6px -1px rgba(0,0,0,0.1)' },
                        },
                    },
                    invert: {
                        css: {
                            color: theme('colors.gray.300'),
                            h2: {
                                color: theme('colors.white'),
                                borderBottomColor: theme('colors.slate.700'),
                            },
                            h3: { color: theme('colors.gray.200') },
                            a: {
                                color: theme('colors.blue.400'),
                                '&:hover': { color: theme('colors.blue.300') },
                            },
                            blockquote: {
                                borderLeftColor: theme('colors.accent.500'),
                                backgroundColor: 'rgba(245, 158, 11, 0.1)',
                                color: theme('colors.gray.200'),
                            },
                            strong: { color: theme('colors.white') },
                        },
                    },
                }),
            }
        }
    }
{% endlocalize %}
</script>
