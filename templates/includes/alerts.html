<!-- Toast Notifications con Alpine.js -->
<div x-data="{ 
    messages: [],
    
    addMessage(text, type = 'info') {
        const id = Date.now();
        this.messages.push({ id, text, type });
        setTimeout(() => this.removeMessage(id), 4000);
    },
    
    removeMessage(id) {
        this.messages = this.messages.filter(m => m.id !== id);
    }
}" 
@message.window="addMessage($event.detail.text, $event.detail.type)"
class="fixed top-20 right-4 z-50 space-y-2 max-w-md">
    
    <template x-for="message in messages" :key="message.id">
        <div x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0 translate-x-full"
             x-transition:enter-end="opacity-100 translate-x-0"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="opacity-100 translate-x-0"
             x-transition:leave-end="opacity-0 translate-x-full"
             class="flex items-start gap-3 p-4 rounded-lg shadow-lg backdrop-blur-sm"
             :class="{
                 'bg-green-500/90 text-white': message.type === 'success',
                 'bg-red-500/90 text-white': message.type === 'error',
                 'bg-yellow-500/90 text-white': message.type === 'warning',
                 'bg-blue-500/90 text-white': message.type === 'info'
             }">
            
            <!-- Icon -->
            <div class="flex-shrink-0">
                <i x-show="message.type === 'success'" data-lucide="check-circle" class="w-5 h-5"></i>
                <i x-show="message.type === 'error'" data-lucide="x-circle" class="w-5 h-5"></i>
                <i x-show="message.type === 'warning'" data-lucide="alert-triangle" class="w-5 h-5"></i>
                <i x-show="message.type === 'info'" data-lucide="info" class="w-5 h-5"></i>
            </div>
            
            <!-- Message -->
            <p x-text="message.text" class="flex-1 text-sm font-medium"></p>
            
            <!-- Close Button -->
            <button @click="removeMessage(message.id)" class="flex-shrink-0 hover:opacity-75 transition-opacity">
                <i data-lucide="x" class="w-4 h-4"></i>
            </button>
        </div>
    </template>
</div>

<!-- Django Messages (convertir a Alpine) -->
{% if messages %}
<script>
    document.addEventListener('DOMContentLoaded', () => {
        {% for message in messages %}
        window.dispatchEvent(new CustomEvent('message', {
            detail: {
                text: '{{ message|escapejs }}',
                type: '{% if message.tags %}{{ message.tags }}{% else %}info{% endif %}'
            }
        }));
        {% endfor %}
    });
</script>
{% endif %}
