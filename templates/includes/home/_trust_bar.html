{% load static %}

<!-- Trust Bar - Static confidence signals -->
<div class="w-full bg-slate-50 dark:bg-slate-900 border-t border-b border-slate-200 dark:border-slate-700 py-4">
    <div class="container mx-auto px-4 sm:px-6 lg:px-8">
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 text-center sm:text-left divide-y sm:divide-y-0 sm:divide-x divide-slate-200 dark:divide-slate-700">
            
            <!-- Local Location -->
            <div class="pb-4 sm:pb-0 sm:px-4 first:pl-0">
                <div class="flex items-center justify-center sm:justify-start gap-3">
                    <span class="text-2xl">📍</span>
                    <div>
                        <p class="text-xs text-slate-500 dark:text-slate-400 uppercase tracking-wide">Local</p>
                        <p class="font-semibold text-slate-900 dark:text-slate-50">Resistencia, Chaco</p>
                    </div>
                </div>
            </div>

            <!-- Shipping Region -->
            <div class="py-4 sm:py-0 sm:px-4">
                <div class="flex items-center justify-center sm:justify-start gap-3">
                    <span class="text-2xl">🚚</span>
                    <div>
                        <p class="text-xs text-slate-500 dark:text-slate-400 uppercase tracking-wide">Envíos</p>
                        <p class="font-semibold text-slate-900 dark:text-slate-50">A todo el Chaco</p>
                    </div>
                </div>
            </div>

            <!-- Billing Invoice -->
            <div class="pt-4 sm:pt-0 sm:px-4">
                <div class="flex items-center justify-center sm:justify-start gap-3">
                    <span class="text-2xl">📄</span>
                    <div>
                        <p class="text-xs text-slate-500 dark:text-slate-400 uppercase tracking-wide">Facturación</p>
                        <p class="font-semibold text-slate-900 dark:text-slate-50">Factura A y B</p>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
