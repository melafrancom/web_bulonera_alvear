{% load static %}

{% comment %}
Floating Cart Component
Usage: {% include 'includes/partials/_floating_cart.html' %}
Requires Alpine.js and cart API endpoint at {% url 'cart:get_cart_data' %}
{% endcomment %}

<div x-data="{
    open: false,
    items: [],
    total: 0,
    count: 0,
    loading: false,
    
    async load() {
        try {
            this.loading = true;
            const res = await fetch('{% url "cart:get_cart_data" %}');
            const data = await res.json();
            this.items = data.cart_items || [];
            this.total = data.cart_total || 0;
            this.count = data.cart_count || 0;
        } catch (error) {
            console.error('Error loading cart:', error);
        } finally {
            this.loading = false;
        }
    },
    
    toggle() {
        this.open = !this.open;
    },
    
    close() {
        this.open = false;
    }
}" 
x-init="load()"
@cart-updated.window="load()"
class="fixed bottom-6 right-6 z-50">
    
    <!-- Toggle Button -->
    <button @click="toggle()" 
            class="relative p-4 bg-primary-600 hover:bg-primary-700 dark:bg-primary-500 dark:hover:bg-primary-600 text-white rounded-full shadow-lg hover:shadow-xl transition-all transform hover:scale-110">
        <i data-lucide="shopping-cart" class="w-6 h-6"></i>
        <span x-show="count > 0" 
              x-text="count"
              class="absolute -top-2 -right-2 flex items-center justify-center w-6 h-6 text-xs font-bold text-white bg-accent-500 rounded-full">
        </span>
    </button>
    
    <!-- Cart Panel -->
    <div x-show="open"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 translate-y-4"
         x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 translate-y-0"
         x-transition:leave-end="opacity-0 translate-y-4"
         @click.away="close()"
         class="absolute bottom-20 right-0 w-80 md:w-96 bg-white dark:bg-slate-800 rounded-xl shadow-2xl border border-slate-200 dark:border-slate-700 overflow-hidden"
         style="display: none;">
        
        <!-- Header -->
        <div class="flex items-center justify-between p-4 border-b border-slate-200 dark:border-slate-700">
            <h3 class="text-lg font-bold text-slate-900 dark:text-white">Mi Carrito</h3>
            <button @click="close()" 
                    class="p-1 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition-colors">
                <i data-lucide="x" class="w-5 h-5 text-slate-600 dark:text-slate-400"></i>
            </button>
        </div>
        
        <!-- Body -->
        <div class="max-h-96 overflow-y-auto p-4">
            <template x-if="loading">
                <div class="flex items-center justify-center py-8">
                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary-600"></div>
                </div>
            </template>
            
            <template x-if="!loading && items.length === 0">
                <div class="text-center py-8">
                    <i data-lucide="shopping-cart" class="w-12 h-12 mx-auto mb-3 text-slate-400"></i>
                    <p class="text-slate-600 dark:text-slate-400">Tu carrito está vacío</p>
                </div>
            </template>
            
            <template x-if="!loading && items.length > 0">
                <div class="space-y-3">
                    <template x-for="item in items" :key="item.id">
                        <div class="flex gap-3 p-2 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
                            <img :src="item.image || '{% static "admin/img/placeholder.png" %}'" 
                                 :alt="item.name"
                                 class="w-16 h-16 object-cover rounded-lg flex-shrink-0">
                            <div class="flex-1 min-w-0">
                                <p class="text-sm font-medium text-slate-900 dark:text-white truncate" x-text="item.name"></p>
                                <div class="flex items-center justify-between mt-1">
                                    <span class="text-xs text-slate-600 dark:text-slate-400" x-text="`${item.quantity} x $${(item.price / item.quantity).toFixed(2)}`"></span>
                                    <span class="text-sm font-bold text-primary-600 dark:text-primary-400" x-text="`$${item.price.toFixed(2)}`"></span>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </template>
        </div>
        
        <!-- Footer -->
        <div class="p-4 border-t border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900">
            <div class="flex items-center justify-between mb-3">
                <span class="text-sm font-medium text-slate-700 dark:text-slate-300">Total:</span>
                <span class="text-xl font-bold text-slate-900 dark:text-white" x-text="`$${total.toFixed(2)}`"></span>
            </div>
            <a href="{% url 'cart:cart' %}" 
               class="block w-full px-4 py-3 text-center text-sm font-semibold text-white bg-primary-600 hover:bg-primary-700 dark:bg-primary-500 dark:hover:bg-primary-600 rounded-lg transition-colors">
                Ver Carrito Completo
            </a>
        </div>
    </div>
</div>
