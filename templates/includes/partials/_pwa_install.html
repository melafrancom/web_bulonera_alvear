<!-- PWA Install Prompt -->
<div x-data="pwaInstall()" 
     x-show="showInstall" 
     x-cloak
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0 translate-y-4"
     x-transition:enter-end="opacity-100 translate-y-0"
     x-transition:leave="transition ease-in duration-200"
     x-transition:leave-start="opacity-100 translate-y-0"
     x-transition:leave-end="opacity-0 translate-y-4"
     class="fixed bottom-4 right-4 z-50 bg-blue-700 text-white rounded-2xl p-4 shadow-2xl max-w-sm cursor-pointer hover:bg-blue-800 transition-all"
     @click="install()">
    <div class="flex items-center gap-3">
        <div class="flex-shrink-0">
            <i data-lucide="download" class="w-6 h-6"></i>
        </div>
        <div class="flex-1">
            <p class="font-semibold text-sm">Instalar Bulonera</p>
            <p class="text-xs text-blue-200">Acceso rápido desde tu pantalla</p>
        </div>
        <button @click.stop="dismiss()" 
                class="flex-shrink-0 p-1 hover:bg-blue-600 rounded-lg transition-colors">
            <i data-lucide="x" class="w-4 h-4"></i>
        </button>
    </div>
</div>

<script>
function pwaInstall() {
    return {
        deferredPrompt: null,
        showInstall: false,
        
        init() {
            // Escuchar el evento beforeinstallprompt
            window.addEventListener('beforeinstallprompt', (e) => {
                // Prevenir que Chrome muestre su propio prompt
                e.preventDefault();
                // Guardar el evento para usarlo después
                this.deferredPrompt = e;
                // Mostrar nuestro botón de instalación
                this.showInstall = true;
                console.log('[PWA] Install prompt disponible');
            });
            
            // Escuchar cuando la app se instala
            window.addEventListener('appinstalled', () => {
                console.log('[PWA] App instalada exitosamente');
                this.showInstall = false;
                this.deferredPrompt = null;
            });
        },
        
        async install() {
            if (!this.deferredPrompt) {
                console.log('[PWA] No hay prompt disponible');
                return;
            }
            
            // Mostrar el prompt de instalación
            this.deferredPrompt.prompt();
            
            // Esperar la respuesta del usuario
            const { outcome } = await this.deferredPrompt.userChoice;
            console.log('[PWA] Usuario eligió:', outcome);
            
            if (outcome === 'accepted') {
                console.log('[PWA] Usuario aceptó la instalación');
            } else {
                console.log('[PWA] Usuario rechazó la instalación');
            }
            
            // Limpiar el prompt
            this.deferredPrompt = null;
            this.showInstall = false;
        },
        
        dismiss() {
            this.showInstall = false;
            // Guardar en localStorage que el usuario cerró el prompt
            localStorage.setItem('pwa-install-dismissed', Date.now());
        }
    }
}
</script>
