[uwsgi.old.production]
# Basic Settings
chdir = /var/www/bulonera/bulonera
module = bulonera.wsgi:application
home = /var/www/bulonera/venv
pythonpath = /var/www/bulonera/bulonera
env = DJANGO_SETTINGS_MODULE=bulonera.settings
# Process Management
master = true
processes = 4
threads = 2
enable-threads = true
thunder-lock = true
single-interpreter = true
# Socket Configuration
#socket = /var/www/bulonera/bulonera.sock
http-socket = 127.0.0.1:8001
chmod-socket = 666
chown-socket = adminbuloneraalvear:www-data
so-reuseport = true
socket-timeout = 120
# User/Group
uid = adminbuloneraalvear
gid = www-data
# Resource Management
harakiri = 180
harakiri-verbose = true
max-requests = 5000
max-worker-lifetime = 3600
max-fd = 2048
no-orphans = true
reload-on-rss = 512
reload-mercy = 60
worker-reload-mercy = 60
mule-reload-mercy = 60
memory-report = true
buffer-size = 65536
post-buffering = 16384
# Logging
logto = /var/log/uwsgi-bulonera/uwsgi.log
log-slow = true
log-4xx = true
log-5xx = true
log-maxsize = 20971520
log-master = true
log-reopen = true
log-slow-timeout = 30
log-date = true
log-zero = true
log-ioerror = true
memory-report = true
# Gestión de archivos estáticos
static-map = /static=/var/www/bulonera/bulonera/static
static-map = /media=/var/www/bulonera/bulonera/media
# Debug Options
catch-exceptions = true
python-autoreload = 1
python-tracebacker = /var/log/uwsgi-bulonera/uwsgi-tracebacker
py-tracebacker = /var/log/uwsgi-bulonera/uwsgi-tracebacker
# Cleanup
vacuum = true
die-on-term = true
no-orphans = true
auto-procname = true
procname-prefix = "bulonera-"
# PID File
pidfile = /tmp/uwsgi-bulonera.pid
touch-reload = /var/www/bulonera/uwsgi.ini
# Error Prevention
ignore-sigpipe = true
ignore-write-errors = true
disable-write-exception = true
# Performance Tuning
optimize = true
enable-metrics = true
# Retry Management
retry-delay = 5
max-retries = 10
# Buffer Management
response-buffer-size = 65536
request-buffer-size = 65536