[uwsgi]
; ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
; Módulo Django
; ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
chdir           = /app
module          = web_bulonera.wsgi:application
; DJANGO_SETTINGS_MODULE también viene del .env vía docker-compose,
; pero lo forzamos aquí como fallback doble seguro.
env             = DJANGO_SETTINGS_MODULE=web_bulonera.settings.production

; ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
; Socket HTTP (OpenLiteSpeed se conecta a 127.0.0.1:8003 del host,
; que Docker mapea al puerto 8002 del contenedor)
; ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
http-socket     = 0.0.0.0:8002
chmod-socket    = 666

; ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
; Procesos (VPS: 2 CPUs, 7.8GB RAM)
; Fórmula: processes = (2 * CPUs) + 1 = 3
; Ajustar si hay saturación de RAM (docker stats)
; ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
master          = true
processes       = 3
threads         = 2
enable-threads  = true
thunder-lock    = true
single-interpreter = true

; ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
; Gestión de recursos
; ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
; Matar worker si tarda más de 120s (previene workers colgados)
harakiri                = 120
harakiri-verbose        = true
; Reciclar workers para evitar memory leaks
max-requests            = 2000
max-worker-lifetime     = 3600
; Reiniciar worker si usa más de 256MB
reload-on-rss           = 256
; Buffers de red
buffer-size             = 65536
post-buffering          = 16384
; Máximo de file descriptors
max-fd                  = 2048

; ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
; Tiempos de espera graceful en reload/restart
; ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
reload-mercy            = 60
worker-reload-mercy     = 60

; ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
; Logs - escritos en volumen montado del host (/var/www/bulonera/logs)
; ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
logto           = /app/logs/uwsgi_web.log
log-maxsize     = 10485760  ; 10MB
log-master      = true
log-reopen      = true
log-4xx         = true
log-5xx         = true
log-date        = true
log-slow        = true
log-ioerror     = true
memory-report   = true

; ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
; Naming (útil para ver en `docker top` o `ps aux`)
; ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
auto-procname   = true
procname-prefix = web-

; ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
; Limpieza al salir
; ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
vacuum          = true
die-on-term     = true
no-orphans      = true

; ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
; Manejo de errores de red (evita crashes por conexiones rotas)
; ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
catch-exceptions        = true
ignore-sigpipe          = true
ignore-write-errors     = true
disable-write-exception = true
