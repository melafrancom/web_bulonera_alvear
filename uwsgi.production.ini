[uwsgi]
# Basic Settings
chdir = /app
module = web_bulonera.wsgi:application

# Process Management
master = true
processes = 4
threads = 2
enable-threads = true
thunder-lock = true
single-interpreter = true

# Socket Configuration
http-socket = 0.0.0.0:8002
so-reuseport = true
socket-timeout = 120

# Resource Management
harakiri = 180
harakiri-verbose = true
max-requests = 5000
max-worker-lifetime = 3600
max-fd = 2048
no-orphans = true
reload-on-rss = 512
reload-mercy = 60
worker-reload-mercy = 60
mule-reload-mercy = 60
memory-report = true
buffer-size = 65536
post-buffering = 16384

# Cleanup
die-on-term = true
auto-procname = true
procname-prefix = "bulonera-"

# Error Prevention
ignore-sigpipe = true
ignore-write-errors = true
disable-write-exception = true

# Performance Tuning
optimize = true

# Retry Management
retry-delay = 5
max-retries = 10

# Buffer Management
response-buffer-size = 65536
request-buffer-size = 65536
